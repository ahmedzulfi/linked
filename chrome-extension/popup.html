<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 240px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #FBFBFB;
      color: #171717;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .logo {
      width: 24px;
      height: 24px;
    }
    .title {
      font-size: 15px;
      font-weight: 700;
      color: #2A2A2F;
    }
    .desc {
      font-size: 12px;
      line-height: 1.5;
      color: #6B7280;
    }
    .step {
      background-color: #FFFFFF;
      border: 1px solid #E6E6E6;
      border-radius: 8px;
      padding: 8px 12px;
      margin-top: 8px;
      font-size: 11px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg class="logo" fill="none" stroke="#2A2A2F" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 21l8.982-11.795H13.62l1.382-7.205L6 13.795h5.193L9.813 15.904z"></path>
    </svg>
    <div class="title">Webild Assistant</div>
  </div>
  <div class="desc">Generate your portfolio micro-site instantly from LinkedIn.</div>
  <div class="step">
    👉 Go to your LinkedIn profile tab and click the <b>Create Webild Page</b> floating button!
  </div>
</body>
</html>
